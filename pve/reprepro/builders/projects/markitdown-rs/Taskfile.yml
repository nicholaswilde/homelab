version: '3'

vars:
  ROOT: "{{.TASKFILE_DIR}}/../.."
  REMOTE_IP: { sh: 'grep REMOTE_IP {{.ROOT}}/../.env | cut -d= -f2' }
  MARKITDOWN_PROJECT_NAME: markitdown-rs
  MARKITDOWN_PROJECT_REPO_URL: https://github.com/uhobnil/markitdown-rs.git
  MARKITDOWN_PROJECT_LATEST_VERSION:
    sh: curl -s https://raw.githubusercontent.com/uhobnil/markitdown-rs/master/Cargo.toml | grep "^version = " | cut -d '"' -f 2
  MARKITDOWN_PROJECT_VERSION_TAG: master
  CACHE_DIR: "{{.ROOT}}/.cache"
  DIST_DIR: "{{.ROOT}}/dist"
  BUILD_DIR: "{{.ROOT}}/build"
  MARKITDOWN_PROJECT_REPO_VERSION: { sh: 'curl -s "http://{{.REMOTE_IP}}/debian/dists/bookworm/main/binary-amd64/Packages" | grep -A 10 "^Package: {{.MARKITDOWN_PROJECT_NAME}}$" | grep "^Version: " | cut -d" " -f2 | head -n 1 || echo "0.0.0"' }

tasks:
  check:
    desc: Verify the metadata of .deb files for this app only
    cmds:
      - cmd: |
          echo "Checking artifacts for {{.MARKITDOWN_PROJECT_NAME}} in {{.DIST_DIR}}..."
          echo "---------------------------------------------------"
          files=$(ls {{.DIST_DIR}}/{{.MARKITDOWN_PROJECT_NAME}}*.deb 2>/dev/null)

          if [ -z "$files" ]; then
            echo "⚠️  No .deb files found for {{.MARKITDOWN_PROJECT_NAME}}."
            exit 0
          fi

          for f in $files; do
            echo "📦 $(basename $f)"
            dpkg --info "$f" | grep -E "^ (Package|Version|Architecture):"
            echo "---------------------------------------------------"
          done
    silent: true

  build:
    desc: Build MarkItDown (Rust)
    cmds:
      - echo "Building {{.MARKITDOWN_PROJECT_NAME}}..."
      - mkdir -p {{.CACHE_DIR}} {{.DIST_DIR}} {{.BUILD_DIR}}/stage
      - cmd: |
          DIR="{{.BUILD_DIR}}/{{.MARKITDOWN_PROJECT_NAME}}"
          DAYS={{default "7" .BUILDER_CACHE_MAX_AGE_DAYS}}
          if [ -d "$DIR" ] && [ -z "$(find "$DIR" -maxdepth 0 -mtime -$DAYS)" ]; then
            echo "🗑️ Cache for {{.MARKITDOWN_PROJECT_NAME}} is older than $DAYS days. Cleaning..."
            rm -rf "$DIR"
          fi
          if [ -d "$DIR/.git" ]; then
            cd "$DIR"
            git fetch --quiet
            git reset --hard --quiet
            git clean -fd --quiet
            git checkout {{.MARKITDOWN_PROJECT_VERSION_TAG}} --quiet
            git pull origin {{.MARKITDOWN_PROJECT_VERSION_TAG}} --quiet
          else
            if ! git clone --depth 1 --branch {{.MARKITDOWN_PROJECT_VERSION_TAG}} {{.MARKITDOWN_PROJECT_REPO_URL}} "$DIR" --quiet; then
              echo -e "\033[31mX\033[0m Error: Failed to clone {{.MARKITDOWN_PROJECT_NAME}}"
              exit 1
            fi
          fi
          # Patch Cargo.toml to use vendored openssl to avoid host OpenSSL dependency
          if ! grep -q "openssl" "$DIR/Cargo.toml"; then
            echo -e '\nopenssl = { version = "0.10", features = ["vendored"] }' >> "$DIR/Cargo.toml"
          fi
      - task: process-target
        vars: {RUST: "x86_64-unknown-linux-gnu", GO: "amd64", DEB: "amd64", SUFFIX: "amd64"}
      - task: process-target
        vars: {RUST: "aarch64-unknown-linux-gnu", GO: "arm64", DEB: "arm64", SUFFIX: "arm64"}
      - task: process-target
        vars: {RUST: "armv7-unknown-linux-gnueabihf", GO: "arm_7", DEB: "armhf", SUFFIX: "armhf"}
      - task: process-target
        vars: {RUST: "arm-unknown-linux-gnueabihf", GO: "arm_6", DEB: "armhf", SUFFIX: "armhf+armv6"}
      - echo "✅ {{.MARKITDOWN_PROJECT_NAME}} build complete."

  process-target:
    internal: true
    cmds:
      - task: compile
        vars: {RUST_TARGET: "{{.RUST}}", GO_FOLDER: "linux_{{.GO}}"}
      - task: package
        vars: {GO_ARCH: "{{.GO}}", ARCH: "{{.DEB}}", SUFFIX: "{{.SUFFIX}}"}

  compile:
    internal: true
    dir: "{{.BUILD_DIR}}/{{.MARKITDOWN_PROJECT_NAME}}"
    cmds:
      - echo "Building for {{.RUST_TARGET}}..."
      - cross build --release --target {{.RUST_TARGET}}
      - mkdir -p {{.CACHE_DIR}}/{{.GO_FOLDER}}
      - cp target/{{.RUST_TARGET}}/release/markitdown {{.CACHE_DIR}}/{{.GO_FOLDER}}/

  package:
    internal: true
    dir: "{{.BUILD_DIR}}/stage"
    cmds:
      - echo "Packaging {{.ARCH}}..."
      - cp {{.CACHE_DIR}}/linux_{{.GO_ARCH}}/markitdown ./binary
      - cmd: |
          echo 'name: "{{.MARKITDOWN_PROJECT_NAME}}"' > nfpm.yaml
          echo 'arch: "{{.ARCH}}"' >> nfpm.yaml
          echo 'platform: "linux"' >> nfpm.yaml
          echo 'version: "{{.MARKITDOWN_PROJECT_LATEST_VERSION}}"' >> nfpm.yaml
          echo 'section: "default"' >> nfpm.yaml
          echo 'priority: "extra"' >> nfpm.yaml
          echo 'maintainer: "Homelab Admin <admin@local>"' >> nfpm.yaml
          echo 'description: "Homelab build of {{.MARKITDOWN_PROJECT_NAME}}"' >> nfpm.yaml
          echo 'vendor: "Homelab"' >> nfpm.yaml
          echo 'homepage: "{{.MARKITDOWN_PROJECT_REPO_URL}}"' >> nfpm.yaml
          echo 'license: "MIT"' >> nfpm.yaml
          echo 'contents:' >> nfpm.yaml
          echo '  - src: "./binary"' >> nfpm.yaml
          echo '    dst: "/usr/bin/markitdown"' >> nfpm.yaml
          echo '    file_info:' >> nfpm.yaml
          echo '      mode: 0755' >> nfpm.yaml
          nfpm pkg --config nfpm.yaml --packager deb --target {{.DIST_DIR}}/{{.MARKITDOWN_PROJECT_NAME}}_{{.MARKITDOWN_PROJECT_LATEST_VERSION}}_{{.SUFFIX}}.deb
          rm nfpm.yaml binary

  latest:
    desc: Compare latest GitHub version with current reprepro version
    cmds:
      - echo "GitHub Version {{.MARKITDOWN_PROJECT_LATEST_VERSION}}"
      - echo "Repo Version   {{.MARKITDOWN_PROJECT_REPO_VERSION | default "0.0.0"}}"
      - |
        gh_version="{{.MARKITDOWN_PROJECT_LATEST_VERSION}}"
        repo_version="{{.MARKITDOWN_PROJECT_REPO_VERSION | default "0.0.0"}}"
        if dpkg --compare-versions "${gh_version#v}" gt "$repo_version"; then
          echo "🚀 Update available!"
        else
          echo "✅ Up to date."
        fi
    silent: true

  default:
    cmds:
      - task -l
    silent: true
