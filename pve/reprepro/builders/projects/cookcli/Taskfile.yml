version: '3'

vars:
  ROOT:
    sh: realpath -m "{{.TASKFILE_DIR}}/../.."
  COOKCLI_PROJECT_NAME: cookcli
  COOKCLI_BINARY_NAME: cook
  COOKCLI_REPO_URL: https://github.com/cooklang/cookcli.git
  COOKCLI_LATEST_VERSION:
    sh: git ls-remote --tags --refs --sort="v:refname" {{.COOKCLI_REPO_URL}} | tail -n1 | sed 's/.*\///'
  COOKCLI_VERSION_TAG: '{{default .COOKCLI_LATEST_VERSION .VERSION}}'
  CACHE_DIR: "{{.ROOT}}/.cache"
  DIST_DIR: "{{.ROOT}}/dist"
  BUILD_DIR: "{{.ROOT}}/build"

tasks:
  check:
    desc: Verify the metadata of .deb files for this app only
    cmds:
      - cmd: |
          echo "Checking artifacts for {{.COOKCLI_PROJECT_NAME}} in ../../dist/..."
          echo "---------------------------------------------------"
          files=$(ls ../../dist/{{.COOKCLI_PROJECT_NAME}}*.deb 2>/dev/null)

          if [ -z "$files" ]; then
            echo "⚠️  No .deb files found for {{.COOKCLI_PROJECT_NAME}}."
            exit 0
          fi

          for f in $files; do
            echo "📦 $(basename $f)"
            dpkg --info "$f" | grep -E "^ (Package|Version|Architecture):"
            echo "---------------------------------------------------"
          done
    silent: true

  build:
    desc: "Build {{.COOKCLI_PROJECT_NAME}} (Rust)"
    cmds:
      - echo "Building {{.COOKCLI_PROJECT_NAME}}..."
      - mkdir -p {{.CACHE_DIR}} {{.DIST_DIR}} {{.BUILD_DIR}}/stage
      - cmd: |
          DIR="{{.BUILD_DIR}}/{{.COOKCLI_PROJECT_NAME}}"
          DAYS={{default "7" .BUILDER_CACHE_MAX_AGE_DAYS}}
          if [ -d "$DIR" ] && [ -z "$(find "$DIR" -maxdepth 0 -mtime -$DAYS)" ]; then
            echo "🗑️ Cache for {{.COOKCLI_PROJECT_NAME}} is older than $DAYS days. Cleaning..."
            rm -rf "$DIR"
          fi
          if [ -d "$DIR/.git" ]; then
            cd "$DIR"
            git fetch --tags --quiet
            if ! git rev-parse {{.COOKCLI_VERSION_TAG}} >/dev/null 2>&1; then
              echo -e "\033[31mX\033[0m Error: Tag {{.COOKCLI_VERSION_TAG}} not found in {{.COOKCLI_PROJECT_NAME}}"
              exit 1
            fi
            git reset --hard --quiet
            git clean -fd --quiet
            git checkout {{.COOKCLI_VERSION_TAG}} --quiet
          else
            if ! git clone --depth 1 --branch {{.COOKCLI_VERSION_TAG}} {{.COOKCLI_REPO_URL}} "$DIR" --quiet; then
              echo -e "\033[31mX\033[0m Error: Failed to clone {{.COOKCLI_PROJECT_NAME}}"
              exit 1
            fi
          fi
      - cmd: |
          FILE="{{.BUILD_DIR}}/{{.COOKCLI_PROJECT_NAME}}/Cross.toml"
          echo '[target.aarch64-unknown-linux-gnu]' > "$FILE"
          echo 'image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"' >> "$FILE"
          echo '[target.armv7-unknown-linux-gnueabihf]' >> "$FILE"
          echo 'image = "ghcr.io/cross-rs/armv7-unknown-linux-gnueabihf:edge"' >> "$FILE"
          echo '[target.arm-unknown-linux-gnueabihf]' >> "$FILE"
          echo 'image = "ghcr.io/cross-rs/arm-unknown-linux-gnueabihf:edge"' >> "$FILE"
          echo '[target.x86_64-unknown-linux-gnu]' >> "$FILE"
          echo 'image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:edge"' >> "$FILE"
      - task: process-target
        vars: {RUST: "x86_64-unknown-linux-gnu", GO: "amd64", DEB: "amd64"}
      - task: process-target
        vars: {RUST: "aarch64-unknown-linux-gnu", GO: "arm64", DEB: "arm64"}
      - task: process-target
        vars: {RUST: "armv7-unknown-linux-gnueabihf", GO: "arm_7", DEB: "armhf"}
      - task: process-target
        vars: {RUST: "arm-unknown-linux-gnueabihf", GO: "arm_6", DEB: "armel"}
      - echo "✅ {{.COOKCLI_PROJECT_NAME}} build complete."

  process-target:
    internal: true
    cmds:
      - task: compile
        vars: {RUST_TARGET: "{{.RUST}}", GO_FOLDER: "linux_{{.GO}}"}
      - task: package
        vars: {GO_ARCH: "{{.GO}}", ARCH: "{{.DEB}}"}

  compile:
    internal: true
    dir: "{{.BUILD_DIR}}/{{.COOKCLI_PROJECT_NAME}}"
    cmds:
      - echo "Building for {{.RUST_TARGET}}..."
      - cross build --release --target {{.RUST_TARGET}}
      - mkdir -p {{.CACHE_DIR}}/{{.GO_FOLDER}}
      - cp target/{{.RUST_TARGET}}/release/{{.COOKCLI_BINARY_NAME}} {{.CACHE_DIR}}/{{.GO_FOLDER}}/

  package:
    internal: true
    dir: "{{.BUILD_DIR}}/stage"
    cmds:
      - echo "Packaging {{.ARCH}}..."
      - cp {{.CACHE_DIR}}/linux_{{.GO_ARCH}}/{{.COOKCLI_BINARY_NAME}} ./binary
      - cmd: |
          echo 'name: "{{.COOKCLI_PROJECT_NAME}}"' > nfpm.yaml
          echo 'arch: "{{.ARCH}}"' >> nfpm.yaml
          echo 'platform: "linux"' >> nfpm.yaml
          echo 'version: "{{.COOKCLI_VERSION_TAG | replace "v" ""}}"' >> nfpm.yaml
          echo 'section: "default"' >> nfpm.yaml
          echo 'priority: "extra"' >> nfpm.yaml
          echo 'maintainer: "Homelab Admin <admin@local>"' >> nfpm.yaml
          echo 'description: "Homelab build of {{.COOKCLI_PROJECT_NAME}}"' >> nfpm.yaml
          echo 'vendor: "Homelab"' >> nfpm.yaml
          echo 'homepage: "{{.COOKCLI_REPO_URL}}"' >> nfpm.yaml
          echo 'license: "MIT"' >> nfpm.yaml
          echo 'contents:' >> nfpm.yaml
          echo '  - src: "./binary"' >> nfpm.yaml
          echo '    dst: "/usr/bin/{{.COOKCLI_BINARY_NAME}}"' >> nfpm.yaml
          echo '    file_info:' >> nfpm.yaml
          echo '      mode: 0755' >> nfpm.yaml
          nfpm pkg --config nfpm.yaml --packager deb --target {{.DIST_DIR}}/{{.COOKCLI_PROJECT_NAME}}_{{.COOKCLI_VERSION_TAG}}_{{.ARCH}}.deb
          rm nfpm.yaml binary

  default:
    cmds:
      - task -l
    silent: true

  latest:
    desc: Check the latest version available on GitHub
    cmds:
      - echo "Latest Version {{.COOKCLI_VERSION_TAG}}"
    silent: true
