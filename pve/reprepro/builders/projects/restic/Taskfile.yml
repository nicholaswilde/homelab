# projects/restic/Taskfile.yml
version: '3'

vars:
  # Define the absolute path to the repository root
  ROOT: "{{.TASKFILE_DIR}}/../.."
  RESTIC_PROJECT_NAME: restic
  RESTIC_REPO_URL: https://github.com/restic/restic.git
  RESTIC_LATEST_VERSION:
    sh: git ls-remote --tags --refs --sort="v:refname" {{.RESTIC_REPO_URL}} | tail -n1 | sed 's/.*\///'
  RESTIC_MAIN_PATH: ./cmd/restic
  RESTIC_VERSION_TAG: '{{default .RESTIC_LATEST_VERSION .VERSION}}'

tasks:
  check:
    desc: Verify the metadata of .deb files for this app only
    cmds:
      - cmd: |
          echo "Checking artifacts for {{.RESTIC_PROJECT_NAME}} in ../../dist/..."
          echo "---------------------------------------------------"
          
          # FIX: Filter by Project Name
          # We use "ls" first to handle the case where no files exist without crashing the loop
          files=$(ls ../../dist/{{.RESTIC_PROJECT_NAME}}*.deb 2>/dev/null)

          if [ -z "$files" ]; then
            echo "⚠️  No .deb files found for {{.RESTIC_PROJECT_NAME}}."
            exit 0
          fi

          for f in $files; do
            echo "📦 $(basename $f)"
            dpkg --info "$f" | grep -E "^ (Package|Version|Architecture):"
            echo "---------------------------------------------------"
          done

  latest:
    desc: Check the latest version available on GitHub
    cmds:
      - echo "Latest Version {{.RESTIC_VERSION_TAG}}"
    silent: true

  build:
    desc: Build Restic (Go)
    env:
      PROJECT_NAME: "{{.RESTIC_PROJECT_NAME}}"
      MAIN_PATH: "{{.RESTIC_MAIN_PATH}}"
      VERSION_TAG: "{{.RESTIC_VERSION_TAG}}"
    cmds:
      - echo "Building {{.RESTIC_PROJECT_NAME}}..."
      
      - cmd: |
          DIR="{{.ROOT}}/build/{{.RESTIC_PROJECT_NAME}}"
          DAYS={{default "7" .BUILDER_CACHE_MAX_AGE_DAYS}}
          if [ -d "$DIR" ] && [ -z "$(find "$DIR" -maxdepth 0 -mtime -$DAYS)" ]; then
            echo "🗑️ Cache for {{.RESTIC_PROJECT_NAME}} is older than $DAYS days. Cleaning..."
            rm -rf "$DIR"
          fi
          if [ -d "$DIR/.git" ]; then
            cd "$DIR"
            git fetch --tags --quiet
            if ! git rev-parse {{.RESTIC_VERSION_TAG}} >/dev/null 2>&1; then
              echo -e "\033[31mX\033[0m Error: Tag {{.RESTIC_VERSION_TAG}} not found in {{.RESTIC_PROJECT_NAME}}"
              exit 1
            fi
            git reset --hard --quiet
            git clean -fd --quiet
            git checkout {{.RESTIC_VERSION_TAG}} --quiet
          else
            if ! git clone --depth 1 --branch {{.RESTIC_VERSION_TAG}} {{.RESTIC_REPO_URL}} "$DIR" --quiet; then
              echo -e "\033[31mX\033[0m Error: Failed to clone {{.RESTIC_PROJECT_NAME}}"
              exit 1
            fi
          fi

      - cmd: |
          cd {{.ROOT}}/build/{{.RESTIC_PROJECT_NAME}}
          PROJECT_NAME={{.RESTIC_PROJECT_NAME}}
          MAIN_PATH={{.RESTIC_MAIN_PATH}}
          VERSION_TAG={{.RESTIC_VERSION_TAG}}
          # Look how clean this path is now:
          goreleaser release --config {{.ROOT}}/templates/goreleaser-main.yaml --snapshot --clean --skip=publish

      - mkdir -p {{.ROOT}}/dist
      - mv {{.ROOT}}/build/{{.RESTIC_PROJECT_NAME}}/dist/*.deb {{.ROOT}}/dist/
      - echo "✅ Restic build complete."
  default:
    cmds:
      - task -l
    silent: true
