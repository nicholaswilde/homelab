version: '3'

vars:
  ROOT:
    sh: realpath -m "{{.TASKFILE_DIR}}/../.."
  YAZI_PROJECT_NAME: yazi
  YAZI_REPO_URL: https://github.com/sxyazi/yazi.git
  YAZI_LATEST_VERSION:
    sh: git ls-remote --tags --refs --sort="v:refname" {{.YAZI_REPO_URL}} | tail -n1 | sed 's/.*\///'
  YAZI_VERSION_TAG: '{{default .YAZI_LATEST_VERSION .VERSION}}'
  CACHE_DIR: "{{.ROOT}}/.cache"
  DIST_DIR: "{{.ROOT}}/dist"
  BUILD_DIR: "{{.ROOT}}/build"

tasks:
  check:
    desc: Verify the metadata of .deb files for this app only
    cmds:
      - cmd: |
          echo "Checking artifacts for {{.YAZI_PROJECT_NAME}} in {{.DIST_DIR}}..."
          echo "---------------------------------------------------"
          files=$(ls {{.DIST_DIR}}/{{.YAZI_PROJECT_NAME}}*.deb 2>/dev/null)

          if [ -z "$files" ]; then
            echo "⚠️  No .deb files found for {{.YAZI_PROJECT_NAME}}."
            exit 0
          fi

          for f in $files; do
            echo "📦 $(basename $f)"
            dpkg --info "$f" | grep -E "^ (Package|Version|Architecture):"
            echo "---------------------------------------------------"
          done
    silent: true

  build:
    desc: Build Yazi (Rust)
    cmds:
      - echo "Building {{.YAZI_PROJECT_NAME}}..."
      - mkdir -p {{.CACHE_DIR}} {{.DIST_DIR}} {{.BUILD_DIR}}/stage
      - cmd: |
          DIR="{{.BUILD_DIR}}/{{.YAZI_PROJECT_NAME}}"
          DAYS={{default "7" .BUILDER_CACHE_MAX_AGE_DAYS}}
          if [ -d "$DIR" ] && [ -z "$(find "$DIR" -maxdepth 0 -mtime -$DAYS)" ]; then
            echo "🗑️ Cache for {{.YAZI_PROJECT_NAME}} is older than $DAYS days. Cleaning..."
            rm -rf "$DIR"
          fi
          if [ -d "$DIR/.git" ]; then
            cd "$DIR"
            git fetch --tags --quiet
            if ! git rev-parse {{.YAZI_VERSION_TAG}} >/dev/null 2>&1; then
              echo -e "\033[31mX\033[0m Error: Tag {{.YAZI_VERSION_TAG}} not found in {{.YAZI_PROJECT_NAME}}"
              exit 1
            fi
            git reset --hard --quiet
            git clean -fd --quiet
            git checkout {{.YAZI_VERSION_TAG}} --quiet
          else
            if ! git clone --depth 1 --branch {{.YAZI_VERSION_TAG}} {{.YAZI_REPO_URL}} "$DIR" --quiet; then
              echo -e "\033[31mX\033[0m Error: Failed to clone {{.YAZI_PROJECT_NAME}}"
              exit 1
            fi
          fi
      - task: process-target
        vars: {RUST: "x86_64-unknown-linux-gnu", GO: "amd64", DEB: "amd64", SUFFIX: "amd64"}
      - task: process-target
        vars: {RUST: "aarch64-unknown-linux-gnu", GO: "arm64", DEB: "arm64", SUFFIX: "arm64"}
      - task: process-target
        vars: {RUST: "armv7-unknown-linux-gnueabihf", GO: "arm_7", DEB: "armhf", SUFFIX: "armhf"}
      - task: process-target
        vars: {RUST: "arm-unknown-linux-gnueabihf", GO: "arm_6", DEB: "armhf", SUFFIX: "armhf+armv6"}
      - echo "✅ {{.YAZI_PROJECT_NAME}} build complete."

  process-target:
    internal: true
    cmds:
      - task: compile
        vars: {RUST_TARGET: "{{.RUST}}", GO_FOLDER: "linux_{{.GO}}"}
      - task: package
        vars: {GO_ARCH: "{{.GO}}", ARCH: "{{.DEB}}", SUFFIX: "{{.SUFFIX}}"}

  compile:
    internal: true
    dir: "{{.BUILD_DIR}}/{{.YAZI_PROJECT_NAME}}"
    cmds:
      - echo "Building for {{.RUST_TARGET}}..."
      - cross build --release --target {{.RUST_TARGET}}
      - mkdir -p {{.CACHE_DIR}}/{{.GO_FOLDER}}
      - cp target/{{.RUST_TARGET}}/release/{{.YAZI_PROJECT_NAME}} {{.CACHE_DIR}}/{{.GO_FOLDER}}/
      - cp target/{{.RUST_TARGET}}/release/ya {{.CACHE_DIR}}/{{.GO_FOLDER}}/ || true

  package:
    internal: true
    dir: "{{.BUILD_DIR}}/stage"
    cmds:
      - echo "Packaging {{.ARCH}}..."
      - cp {{.CACHE_DIR}}/linux_{{.GO_ARCH}}/{{.YAZI_PROJECT_NAME}} ./yazi
      - cp {{.CACHE_DIR}}/linux_{{.GO_ARCH}}/ya ./ya || true
      - cmd: |
          echo 'name: "{{.YAZI_PROJECT_NAME}}"' > nfpm.yaml
          echo 'arch: "{{.ARCH}}"' >> nfpm.yaml
          echo 'platform: "linux"' >> nfpm.yaml
          echo 'version: "{{.YAZI_VERSION_TAG | replace "v" ""}}"' >> nfpm.yaml
          echo 'section: "default"' >> nfpm.yaml
          echo 'priority: "extra"' >> nfpm.yaml
          echo 'maintainer: "Homelab Admin <admin@local>"' >> nfpm.yaml
          echo 'description: "Blazing fast terminal file manager written in Rust, based on async I/O."' >> nfpm.yaml
          echo 'vendor: "Homelab"' >> nfpm.yaml
          echo 'homepage: "{{.YAZI_REPO_URL}}"' >> nfpm.yaml
          echo 'license: "MIT"' >> nfpm.yaml
          echo 'contents:' >> nfpm.yaml
          echo '  - src: "./yazi"' >> nfpm.yaml
          echo '    dst: "/usr/bin/yazi"' >> nfpm.yaml
          echo '    file_info:' >> nfpm.yaml
          echo '      mode: 0755' >> nfpm.yaml
          if [ -f "./ya" ]; then
            echo '  - src: "./ya"' >> nfpm.yaml
            echo '    dst: "/usr/bin/ya"' >> nfpm.yaml
            echo '    file_info:' >> nfpm.yaml
            echo '      mode: 0755' >> nfpm.yaml
          fi
          nfpm pkg --config nfpm.yaml --packager deb --target {{.DIST_DIR}}/{{.YAZI_PROJECT_NAME}}_{{.YAZI_VERSION_TAG}}_{{.SUFFIX}}.deb
          rm nfpm.yaml yazi
          rm ya 2>/dev/null || true

  default:
    cmds:
      - task -l
    silent: true

  latest:
    desc: Check the latest version available on GitHub
    cmds:
      - echo "Latest Version {{.YAZI_VERSION_TAG}}"
    silent: true
