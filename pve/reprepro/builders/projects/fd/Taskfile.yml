version: '3'

vars:
  ROOT: "{{.TASKFILE_DIR}}/../.."
  FD_PROJECT_NAME: fd
  FD_REPO_URL: https://github.com/sharkdp/fd.git
  FD_VERSION_TAG: '{{default "v10.2.0" .VERSION}}'
  FD_CACHE_DIR: "{{.ROOT}}/.cache"
  FD_DIST_DIR: "{{.ROOT}}/dist"
  FD_BUILD_DIR: "{{.ROOT}}/build"

tasks:
  check:
    desc: Verify the metadata of .deb files for this app only
    cmds:
      - cmd: |
          echo "Checking artifacts for {{.FD_PROJECT_NAME}} in {{.FD_DIST_DIR}}..."
          echo "---------------------------------------------------"
          # FIX: Filter by Project Name
          # We use "ls" first to handle the case where no files exist without crashing the loop
          files=$(ls ../../dist/{{.FD_PROJECT_NAME}}*.deb 2>/dev/null)

          if [ -z "$files" ]; then
            echo "⚠️  No .deb files found for {{.FD_PROJECT_NAME}}."
            exit 0
          fi

          for f in $files; do
            echo "📦 $(basename $f)"
            dpkg --info "$f" | grep -E "^ (Package|Version|Architecture):"
            echo "---------------------------------------------------"
          done
    silent: true
  build:
    desc: Build Fd (Rust)
    cmds:
      - echo "Building {{.FD_PROJECT_NAME}}..."
      # Use absolute paths for cleanup
      - mkdir -p {{.FD_CACHE_DIR}} {{.FD_DIST_DIR}} {{.FD_BUILD_DIR}}/stage
      
      - cmd: |
          if [ -d "{{.FD_BUILD_DIR}}/{{.FD_PROJECT_NAME}}/.git" ]; then
            cd {{.FD_BUILD_DIR}}/{{.FD_PROJECT_NAME}} && git fetch --tags && git checkout {{.FD_VERSION_TAG}}
          else
            git clone --depth 1 --branch {{.FD_VERSION_TAG}} {{.FD_REPO_URL}} {{.FD_BUILD_DIR}}/{{.FD_PROJECT_NAME}}
          fi
      
      # Compile Targets
      - task: process-target
        vars: {RUST: "x86_64-unknown-linux-gnu", GO: "amd64", DEB: "amd64", SUFFIX: "amd64"}
      - task: process-target
        vars: {RUST: "aarch64-unknown-linux-gnu", GO: "arm64", DEB: "arm64", SUFFIX: "arm64"}
      - task: process-target
        vars: {RUST: "armv7-unknown-linux-gnueabihf", GO: "arm_7", DEB: "armhf", SUFFIX: "armhf"}
      - task: process-target
        vars: {RUST: "arm-unknown-linux-gnueabihf", GO: "arm_6", DEB: "armhf", SUFFIX: "armhf+armv6"}

      - echo "✅ Fd build complete."

  # --- Internal Helpers ---
  
  process-target:
    internal: true
    cmds:
      - task: compile
        vars: {RUST_TARGET: "{{.RUST}}", GO_FOLDER: "linux_{{.GO}}"}
      - task: package
        vars: {GO_ARCH: "{{.GO}}", ARCH: "{{.DEB}}", SUFFIX: "{{.SUFFIX}}"}

  compile:
    internal: true
    # Run this task inside the source code folder
    dir: "{{.FD_BUILD_DIR}}/{{.FD_PROJECT_NAME}}"
    cmds:
      - echo "Building for {{.RUST_TARGET}}..."
      - cross build --release --target {{.RUST_TARGET}}
      - mkdir -p {{.FD_CACHE_DIR}}/{{.GO_FOLDER}}
      - cp target/{{.RUST_TARGET}}/release/{{.FD_PROJECT_NAME}} {{.FD_CACHE_DIR}}/{{.GO_FOLDER}}/

  package:
    internal: true
    # Run this task inside the staging folder (keeps your project folder clean)
    dir: "{{.FD_BUILD_DIR}}/stage"
    cmds:
      - echo "Packaging {{.ARCH}}..."
      
      # Copy binary to current dir (./binary)
      - cp {{.FD_CACHE_DIR}}/linux_{{.GO_ARCH}}/{{.FD_PROJECT_NAME}} ./binary

      - cmd: |
          # Generate config in the temp folder
          echo 'name: "{{.FD_PROJECT_NAME}}"' > nfpm.yaml
          echo 'arch: "{{.ARCH}}"' >> nfpm.yaml
          echo 'platform: "linux"' >> nfpm.yaml
          echo 'version: "{{.FD_VERSION_TAG | replace "v" ""}}"' >> nfpm.yaml
          echo 'section: "default"' >> nfpm.yaml
          echo 'priority: "extra"' >> nfpm.yaml
          echo 'maintainer: "Homelab Admin <admin@local>"' >> nfpm.yaml
          echo 'description: "Homelab build of {{.FD_PROJECT_NAME}}"' >> nfpm.yaml
          echo 'vendor: "Homelab"' >> nfpm.yaml
          echo 'homepage: "{{.FD_REPO_URL}}"' >> nfpm.yaml
          echo 'license: "MIT"' >> nfpm.yaml
          echo 'contents:' >> nfpm.yaml
          # Src is local now, because we are running inside {{.FD_BUILD_DIR}}/stage
          echo '  - src: "./binary"' >> nfpm.yaml
          echo '    dst: "/usr/bin/{{.FD_PROJECT_NAME}}"' >> nfpm.yaml
          echo '    file_info:' >> nfpm.yaml
          echo '      mode: 0755' >> nfpm.yaml

          # Run NFPM
          nfpm pkg --config nfpm.yaml --packager deb --target {{.FD_DIST_DIR}}/{{.FD_PROJECT_NAME}}_{{.FD_VERSION_TAG}}_{{.SUFFIX}}.deb
          
          # Cleanup
          rm nfpm.yaml binary

  default:
    cmds:
      - task -l
    silent: true

  latest:
    desc: Check the latest version available on GitHub
    cmds:
      - cmd: |
          LATEST=$(git ls-remote --tags --refs --sort="v:refname" {{.FD_REPO_URL}} | tail -n1 | sed 's/.*\///')
          echo "Current Configured Version: {{.FD_VERSION_TAG}}"
          echo "Latest Upstream Version:    $LATEST"
        silent: true
