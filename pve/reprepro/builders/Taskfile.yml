---
version: '3'

includes:
  # Register your projects here
  restic: ./projects/restic/Taskfile.yml
  fd: ./projects/fd/Taskfile.yml
  bat: ./projects/bat/Taskfile.yml
  eget: ./projects/eget/Taskfile.yml
  sops: ./projects/sops/Taskfile.yml
  ubi: ./projects/ubi/Taskfile.yml
  fresh: ./projects/fresh/Taskfile.yml
  yazi: ./projects/yazi/Taskfile.yml
  system-bridge: ./projects/system-bridge/Taskfile.yml
  procs: ./projects/procs/Taskfile.yml
  lnav: ./projects/lnav/Taskfile.yml
  neovim: ./projects/neovim/Taskfile.yml
  pvetui: ./projects/pvetui/Taskfile.yml
  lastpass-cli: ./projects/lastpass-cli/Taskfile.yml
tasks:
  default:
    desc: List available tasks
    cmds:
      - task -l
    silent: true

  webhook:
    desc: Start the webhook listener (interactive)
    cmds:
      - webhook -hooks webhook/hooks.json -verbose -port 9000

  install-service:
    desc: Install and start the systemd webhook service
    cmds:
      - sudo cp webhook/reprepro-webhook.service /etc/systemd/system/
      - sudo systemctl daemon-reload
      - sudo systemctl enable --now reprepro-webhook
      - echo "🚀 Webhook service installed and started!"

  logs:
    desc: View the webhook service logs
    cmds:
      - journalctl -u reprepro-webhook -f

  sync:
    desc: Check and build all outdated projects
    cmds:
      - ./scripts/sync.sh
    silent: true

  build-all:
    desc: Build DEBS for ALL projects
    cmds:
      - task: restic:build
      - task: fd:build
      - task: bat:build
      - task: eget:build
      - task: sops:build
      - task: ubi:build
      - task: fresh:build
      - task: yazi:build
      - task: system-bridge:build
      - task: procs:build
      - task: lnav:build
      - task: neovim:build
      - task: pvetui:build
      - task: lastpass-cli:build
      - echo "🚀 All builds complete! Check dist/ folder."

  clean-all:
    desc: Nuke all build artifacts and caches
    cmds:
      - rm -rf build/ dist/ .cache/
      - echo "✨ Cleaned up workspace."

  prune:
    desc: Remove .deb files in dist/ older than the configured cache age
    cmds:
      - find dist/ -name "*.deb" -type f -mtime +{{default "7" .BUILDER_CACHE_MAX_AGE_DAYS}} -delete
      - echo "🧹 Pruned old artifacts."

  clean-targets:
    desc: Delete heavy Rust target directories to free up space
    cmds:
      - find build/ -name "target" -type d -exec rm -rf {} +
      - echo "🗑️  Cleared compiler targets."

  status:
    desc: Show current storage usage of the builders
    cmds:
      - echo "📊 Storage Usage:"
      - du -sh build/ .cache/ dist/ 2>/dev/null || true
    silent: true

  upload:
    desc: Upload built .deb files to the remote server and trigger import
    cmds:
      - ./upload.sh
