---
http:
 #region routers 
  routers:
    unifi:
      entryPoints:
        - "websecure"
      rule: "Host(`unifi.l.nicholaswilde.io`)"
      middlewares:
        - default-headers@file
        - https-redirectscheme@file
      tls: {}
      service: unifi
  
#endregion
#region services
  services:
    unifi:
      loadBalancer:
        servers:
          - url: "https://192.168.1.1/"
        passHostHeader: true
#endregion
