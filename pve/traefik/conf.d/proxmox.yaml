      middlewares:
        - default-headers@file
        - https-redirectscheme@file
      tls: {}
      service: wolf04

#endregion
#region services
  services:
    proxmox01:
      loadBalancer:
        servers:
          - url: "https://192.168.1.128:8006"
        passHostHeader: true
    proxmox03:
      loadBalancer:
        servers:
          - url: "https://192.168.1.141:8006"
        passHostHeader: true
    proxmox04:
      loadBalancer:
        servers:
          - url: "https://192.168.1.66:8006"
        passHostHeader: true
    wolf01:
      loadBalancer:
        servers:
          - url: "https://192.168.1.128:8553"
        passHostHeader: true
    wolf03:
      loadBalancer:
        servers:
          - url: "https://192.168.1.141:8553"
        passHostHeader: true
    wolf04:
