---
http:
 #region routers 
  routers:
    homebox:
      entryPoints:
        - "websecure"
      rule: "Host(`homebox.l.nicholaswilde.io`)"
      middlewares:
        - default-headers@file
        - https-redirectscheme@file
      tls: {}
      service: homebox
  
#endregion
#region services
  services:
    homebox:
      loadBalancer:
        servers:
          - url: "http://192.168.1.115:7745"
        passHostHeader: true
#endregion
