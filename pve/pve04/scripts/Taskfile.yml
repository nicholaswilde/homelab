version: '3'
dotenv:
  - .env
tasks:
  export:
    silent: true
    desc: Export the task list
    cmds:
      - task --list > task-list.txt
  encrypt:
    desc: Encrypt secrets using SOPS
    preconditions:
      - test -f .env
    cmds:
      - sops -e --input-type dotenv --output-type dotenv .env > .env.enc
  decrypt:
    desc: Decrypt secrets using SOPS
    cmds:
      - sops -d --input-type dotenv --output-type dotenv .env.enc > .env
  default:
    cmds:
      - task -l
    silent: true
