---
version: '3'

env:
  APP_NAME: '{{ .APP_NAME }}'
  USER_NAME: '{{ .USER_NAME | default "username" }}'
  APP_NAME_LOWER: '{{ .APP_NAME | lower | replace " " ""}}'

tasks:
  new:
    desc: Create a new docker app
    cmds:
      - mkdir {{ .APP_NAME_LOWER }}
      - minijinja-cli ./.template/README.md.j2 -D APP_NAME={{ shellQuote .APP_NAME}} > ./{{ .APP_NAME_LOWER }}/README.md
      - minijinja-cli ./.template/.env.tmpl.j2 -D APP_NAME={{ shellQuote .APP_NAME}} > ./{{ .APP_NAME_LOWER }}/.env.tmpl
      - minijinja-cli ./.template/compose.yaml.j2 -D APP_NAME={{ shellQuote .APP_NAME}} -D USER_NAME={{ shellQuote .USER_NAME }} > ./{{ .APP_NAME_LOWER }}/compose.yaml
      - cp .template/Taskfile.yml ./{{ .APP_NAME_LOWER }}/
  update-d:
    desc: Update the application or its running containers.
    cmds:
      - docker compose up --force-recreate --build -d
      - docker image prune -a -f
