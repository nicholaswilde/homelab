version: '3'
tasks:
  doctor:
    desc: Run the Overleaf Toolkit doctor to check the setup.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/doctor
  export:
    silent: true
    desc: Export the task list to `task-list.txt`.
    cmds:
      - task --list > task-list.txt
  logs:
    desc: View the Overleaf application logs.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/logs
  restart:
    desc: Stop then start the Overleaf Docker services.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/stop
      - bin/start
  shell:
    desc: Open an interactive shell inside the Overleaf container.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/shell
  start:
    desc: Start the Overleaf Docker services.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/start
  status:
    desc: Check the status of the Overleaf Docker services.
    dir: /root/overleaf-toolkit
    cmds:
      - docker compose -f lib/docker-compose.yml ps
  stop:
    desc: Stop the Overleaf Docker services.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/stop
  up:
    desc: Run Docker Compose in the foreground.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/up
  up-d:
    desc: Run Docker Compose in the background.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/up -d
  upgrade:
    desc: Upgrade Overleaf to the latest version.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/upgrade
  backup-config:
    desc: Backup the Overleaf config directory.
    dir: /root/overleaf-toolkit
    cmds:
      - bin/backup-config ~/overleaf-config-backup
  default:
    cmds:
      - task -l
    silent: true
    desc: List all available tasks.
